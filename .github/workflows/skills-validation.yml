name: Skills Validation

on:
  push:
    branches: [main]
    paths:
      - 'golang-dev-plugin/**'
      - 'golang-dev-plugin-cn/**'
      - '.claude-plugin/marketplace.json'
      - '.agents/plugins/marketplace.json'
      - '.openclaw-plugin/marketplace.json'
  pull_request:
    branches: [main]
    paths:
      - 'golang-dev-plugin/**'
      - 'golang-dev-plugin-cn/**'
      - '.claude-plugin/marketplace.json'
      - '.agents/plugins/marketplace.json'
      - '.openclaw-plugin/marketplace.json'

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate all SKILL.md files in plugins
        run: |
          set -e
          find golang-dev-plugin/skills golang-dev-plugin-cn/skills -name "SKILL.md" | while read file; do
            echo "Validating: $file"

            dir_name=$(basename "$(dirname "$file")")

            # Check frontmatter exists
            if ! head -1 "$file" | grep -q "^---$"; then
              echo "  ERROR: missing YAML frontmatter (must start with ---)"
              exit 1
            fi

            # Extract name field
            skill_name=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^name:" | sed 's/^name: *//')
            if [ -z "$skill_name" ]; then
              echo "  ERROR: missing required 'name' field in frontmatter"
              exit 1
            fi

            # Check name matches directory
            if [ "$skill_name" != "$dir_name" ]; then
              echo "  ERROR: name '$skill_name' does not match directory '$dir_name'"
              exit 1
            fi

            # Check name format: 1-64 chars, lowercase letters/numbers/hyphens only
            if ! echo "$skill_name" | grep -qE '^[a-z0-9][a-z0-9-]{0,62}[a-z0-9]$'; then
              echo "  ERROR: name '$skill_name' violates naming rules"
              echo "    Must be 1-64 chars, lowercase letters/numbers/hyphens only"
              echo "    Must not start or end with hyphen"
              exit 1
            fi

            # Check no consecutive hyphens
            if echo "$skill_name" | grep -q -- "--"; then
              echo "  ERROR: name '$skill_name' contains consecutive hyphens"
              exit 1
            fi

            # Check description exists and is within 1024 chars
            description=$(sed -n '/^---$/,/^---$/p' "$file" | grep "^description:" | sed 's/^description: *//')
            if [ -z "$description" ]; then
              echo "  ERROR: missing required 'description' field in frontmatter"
              exit 1
            fi

            echo "  OK: $skill_name"
          done

      - name: Verify plugin directories and manifests
        run: |
          set -e
          echo "Checking plugin manifests..."

          for plugin in golang-dev-plugin golang-dev-plugin-cn; do
            # Verify plugin directory exists
            if [ ! -d "$plugin" ]; then
              echo "ERROR: plugin directory $plugin not found"
              exit 1
            fi
            echo "OK: $plugin/ exists"

            # Verify .claude-plugin/plugin.json
            if [ ! -f "$plugin/.claude-plugin/plugin.json" ]; then
              echo "ERROR: $plugin/.claude-plugin/plugin.json missing"
              exit 1
            fi
            echo "OK: $plugin/.claude-plugin/plugin.json"

            # Verify .codex-plugin/plugin.json
            if [ ! -f "$plugin/.codex-plugin/plugin.json" ]; then
              echo "ERROR: $plugin/.codex-plugin/plugin.json missing"
              exit 1
            fi
            echo "OK: $plugin/.codex-plugin/plugin.json"

            # Verify plugin name in plugin.json matches directory
            pname=$(grep '"name"' "$plugin/.claude-plugin/plugin.json" | head -1 | sed 's/.*"name": *"\(.*\)".*/\1/')
            if [ "$pname" != "$plugin" ]; then
              echo "ERROR: plugin name '$pname' does not match directory '$plugin'"
              exit 1
            fi
            echo "OK: plugin name matches directory"
          done

      - name: Verify marketplace entries match plugins
        run: |
          set -e
          echo "Checking marketplace entries..."

          for mkt in .claude-plugin/marketplace.json .agents/plugins/marketplace.json; do
            if ! grep -q "golang-dev-plugin" "$mkt"; then
              echo "ERROR: golang-dev-plugin not found in $mkt"
              exit 1
            fi
            if ! grep -q "golang-dev-plugin-cn" "$mkt"; then
              echo "ERROR: golang-dev-plugin-cn not found in $mkt"
              exit 1
            fi
            echo "OK: $mkt lists both plugins"
          done

      - name: Verify OpenClaw marketplace lists all skills
        run: |
          set -e
          echo "Checking OpenClaw marketplace..."
          for skill in fyne-gui-dev fyne-gui-dev-cn golang-guideline golang-guideline-cn mockey-ut mockey-ut-cn; do
            if ! grep -q "$skill" .openclaw-plugin/marketplace.json; then
              echo "ERROR: $skill not found in .openclaw-plugin/marketplace.json"
              exit 1
            fi
            echo "OK: $skill"
          done
